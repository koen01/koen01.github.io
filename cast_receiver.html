<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Moonraker Viewer Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

    /* Hide the Cast framework's built-in video player element */
    cast-media-player {
      display: none !important;
      visibility: hidden !important;
    }

    /* MJPEG stream — fixed on top of everything */
    #stream {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 9999;
      display: block;
      background: #000;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: 'Google Sans', sans-serif;
      gap: 12px;
      z-index: 9998;
    }
    #splash.hidden { display: none; }
    #splash h1 { font-size: 2em; font-weight: 300; letter-spacing: 0.05em; }
    #splash p { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <img id="stream" alt="">
  <div id="splash">
    <h1>Moonraker Viewer</h1>
    <p id="status">Waiting for stream from the app…</p>
  </div>

  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const streamEl = document.getElementById('stream');
    const splashEl = document.getElementById('splash');
    const statusEl = document.getElementById('status');

    pm.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const url = request.media && request.media.contentUrl;
        if (url) {
          streamEl.onload = () => splashEl.classList.add('hidden');
          streamEl.onerror = () => {
            statusEl.textContent =
              'Stream error — make sure phone and TV are on the same Wi-Fi.';
          };
          streamEl.src = url;
        }
        // Return null to prevent the framework's video player from activating.
        // The cast-media-player element is hidden via CSS so the black overlay
        // it injects is suppressed.
        return null;
      }
    );

    ctx.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
