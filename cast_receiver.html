<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Moonraker Viewer Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    #stream {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: 'Google Sans', sans-serif;
      gap: 12px;
    }
    #splash.hidden { display: none; }
    #splash h1 { font-size: 2em; font-weight: 300; letter-spacing: 0.05em; }
    #splash p { color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <img id="stream" alt="">
  <div id="splash">
    <h1>Moonraker Viewer</h1>
    <p>Waiting for stream from the app…</p>
  </div>

  <!--
    SETUP:
    1. Host this file at a public HTTPS URL (GitHub Pages, Netlify, etc.).
    2. Go to https://cast.google.com/publish, register the URL as a receiver,
       and obtain a Cast Application ID.
    3. In lib/services/cast_service.dart, replace kCastReceiverAppId with
       your App ID.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const ctx = cast.framework.CastReceiverContext.getInstance();
    const pm = ctx.getPlayerManager();
    const streamEl = document.getElementById('stream');
    const splashEl = document.getElementById('splash');

    // Intercept LOAD messages and display the MJPEG URL via <img> instead
    // of the built-in video player (which can't handle multipart/x-mixed-replace).
    pm.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const url = request.media && request.media.contentUrl;
        if (url) {
          streamEl.onload = () => splashEl.classList.add('hidden');
          streamEl.onerror = () => {
            splashEl.querySelector('p').textContent =
              'Stream error — check that the phone and Chromecast are on the same Wi-Fi network.';
          };
          streamEl.src = url;
        }
        return null; // Don't pass to the built-in player
      }
    );

    ctx.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
